name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: plshelp
            archive_ext: tar.gz
            asset_suffix: darwin-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: plshelp
            archive_ext: tar.gz
            asset_suffix: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: plshelp.exe
            archive_ext: zip
            asset_suffix: windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          ASSET="plshelp-${VERSION}-${{ matrix.asset_suffix }}"
          mkdir dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/plshelp"
          chmod +x "dist/plshelp"
          tar -C dist -czf "${ASSET}.tar.gz" plshelp

      - name: Package Windows artifact
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"
          $asset = "plshelp-$version-${{ matrix.asset_suffix }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/plshelp.exe"
          Compress-Archive -Path "dist/plshelp.exe" -DestinationPath "$asset.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_suffix }}
          path: |
            *.tar.gz
            *.zip

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir release
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release
          sha256sum *.tar.gz *.zip > "plshelp-${GITHUB_REF_NAME}-checksums.txt"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*

  test-install:
    name: Test install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install via shell script
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5; do
            if curl -fsSL https://plshelp.run/install.sh | sh; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "install.sh failed after ${attempt} attempts" >&2
              exit 1
            fi
            sleep 10
          done

      - name: Install via PowerShell script
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          PLSHELP_DEBUG: "1"
        run: |
          $ErrorActionPreference = "Stop"
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              irm https://plshelp.run/install.ps1 | iex
              exit 0
            } catch {
              Write-Host "Attempt $attempt failed: $($_.Exception.Message)"
              if ($attempt -eq 5) {
                throw "install.ps1 failed after $attempt attempts. $($_.Exception.Message)"
              }
              Start-Sleep -Seconds 10
            }
          }

      - name: Verify installed binary
        if: matrix.os != 'windows-latest'
        shell: bash
        run: ~/.local/bin/plshelp --help

      - name: Verify installed binary on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $binary = Join-Path $HOME ".local\bin\plshelp.exe"
          & $binary --help
